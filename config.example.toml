# Global hotkey format follows pynput format.
# Common examples:
#   <ctrl>+<alt>+<space>
#   <cmd>+<shift>+v
#   <ctrl>+<option>+r
hotkey = "<ctrl>+<alt>+<space>"

# Fun-ASR language: auto, zh, en, ja
# For mixed zh/en dictation, keep auto.
language = "auto"

# Audio configuration
sample_rate = 16000
channels = 1

# Paste behavior (actual runtime clamps this into 15~60ms)
paste_delay_ms = 20

# Release model memory after this many idle seconds. 0 = never unload.
idle_unload_seconds = 300

# Enable system sound when start/stop recording
enable_beep = true

# Fun-ASR inference options
# ITN: normalize numbers/date etc., may improve readability in some cases.
use_itn = true
# NOTE: Fun-ASR-Nano + AutoModel VAD path currently needs this set to 0.
# keep 0 unless a future runtime explicitly supports non-zero values.
batch_size_s = 0
# false=keep VAD segments (usually better punctuation/pauses), true=merge for possible speed gain.
merge_vad = false

# Optional comma-separated domain terms, e.g. "OpenAI, GitHub, LaunchAgent"
hotwords = ""

# Remove emoji symbols from final pasted text.
remove_emoji = true
